services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: aadhi
      POSTGRES_PASSWORD: aadhi123
      POSTGRES_DB: codebase_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

volumes:
  postgres_data:
